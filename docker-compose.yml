services:
  db:
    image: mariadb:11
    container_name: trip-cost-localization-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Test12
      MYSQL_DATABASE: fuel_calculator_localization
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./src/main/java/org/example/tripcostlocalization/schema.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: trip-cost-localization
    depends_on:
      - db
    environment:
        TRIP_DB_URL: jdbc:mariadb://db:3306/fuel_calculator_localization
        TRIP_DB_USER: root
        TRIP_DB_PASSWORD: Test12

    ports:
      - "6080:80"

volumes:
  db_data: